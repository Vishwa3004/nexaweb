<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexaWeb</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">NEXA<span>WEB</span></div>
    <ul class="nav-links">
      <li><a href="#">Services</a></li>
      <li><a href="#">Portfolio</a></li>
      <li><a href="#">Stack</a></li>
      <li><a href="#">Pricing</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <button class="nav-btn" onclick="handleGetStarted()">GET STARTED →</button>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="orb"></div>

    <div class="badge">
      <span class="badge-dot"></span>
      ✦ &nbsp; FAST DELIVERY — MODERN TECH
    </div>

    <div class="hero-title">
      <div class="line1">CREATE.</div>
      <div class="line2">LAUNCH.</div>
      <div class="line3">GROW.</div>
    </div>

    <div class="hero-bottom">
      <p class="hero-desc">
        A <strong>modern web studio</strong> building fast, scalable,
        and beautiful websites. From idea to <span class="highlight">live product</span>
        — we handle design, code, and deployment.
      </p>
      <div class="hero-actions">
        <button class="btn-orange" onclick="handleProject()">START PROJECT →</button>
        <button class="btn-outline" onclick="handleExplore()">EXPLORE ↓</button>
      </div>
    </div>

    <div class="scroll-hint">scroll</div>
  </section>

  <script src="script.js"></script>
</body>
</html>
